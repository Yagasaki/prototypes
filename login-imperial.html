<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Authentication — Blood Angels Chapter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4af37;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-box {
            background: rgba(13, 13, 13, 0.95);
            border: 3px solid #d4af37;
            border-radius: 2px;
            padding: 40px 30px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3),
                        0 0 60px rgba(204, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #cc0000;
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 12px;
            color: #cc0000;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #d4af37;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            background: rgba(40, 40, 40, 0.8);
            border: 1px solid #666;
            border-radius: 1px;
            color: #d4af37;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #d4af37;
            background: rgba(40, 40, 40, 1);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3),
                        inset 0 0 10px rgba(212, 175, 55, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: #666;
        }

        .submit-btn {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #cc0000 0%, #8b0000 100%);
            color: #d4af37;
            border: 2px solid #d4af37;
            border-radius: 1px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4),
                        0 0 40px rgba(204, 0, 0, 0.4);
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(0);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2),
                        0 0 20px rgba(204, 0, 0, 0.2);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #666;
            font-size: 10px;
            color: #666;
            letter-spacing: 1px;
        }

        .aquila {
            text-align: center;
            margin-bottom: 15px;
            font-size: 20px;
            color: #d4af37;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="header">
                <div class="aquila">⚔️</div>
                <h1>Imperial Access</h1>
                <p>Blood Angels Chapter Authentication</p>
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Designation</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter your designation"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Rite of Passage</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your rite"
                        required
                    >
                </div>

                <button type="submit" class="submit-btn">Authenticate</button>
            </form>

            <div class="footer">
                "In the grim darkness of the far future, there is only war."
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username && password) {
                alert(`Authenticating designation: ${username}\n\nFor the Emperor. For Sanguinius.`);
            }
        }
    </script>
</body>
</html>
